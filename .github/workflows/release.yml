name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build WebUI
        run: cd webui && npm ci && npm run build

      - name: Package module zip
        run: |
          id=$(grep '^id=' module.prop | cut -d= -f2)
          zip -r "$id.zip" META-INF webroot *.prop *.sh

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=$(grep '^id=' module.prop | cut -d= -f2)
          gh release create "${{ github.ref_name }}" "$id.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes
